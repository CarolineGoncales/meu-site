<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato - CPG Technology Consulting</title>

<link rel="icon" type="image/png" href="favicon-32x32.png">
<link rel="stylesheet" href="style.css">

<style>

/* POPUP */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:40px;
border-radius:10px;
text-align:center;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.modal-content h3{
color:#163a63;
margin-bottom:15px;
}

.modal-content p{
color:#444;
margin-bottom:25px;
}

.modal-content button{
background:#163a63;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
cursor:pointer;
}

.modal-content button:hover{
background:#2f6cc3;
}

</style>

</head>

<body>

<header>

<nav>
<a href="index.html">Home</a>
<a href="sobre.html">Sobre</a>
<a href="cursos.html">Cursos</a>
<a href="certificacao.html">Certificação</a>
<a href="contato.html">Contato</a>
</nav>

</header>


<section class="contato">

<h1>Entre em Contato</h1>

<p class="contato-sub">
Tem dúvidas sobre cursos ou certificações? Fale conosco.
</p>

<div class="contato-container">

<form id="formContato" class="contato-form">

<input type="text" id="nome" placeholder="Seu nome" required>

<input type="email" id="email" placeholder="Seu e-mail" required>

<textarea id="mensagem" placeholder="Sua mensagem" required></textarea>

<button type="submit">Enviar mensagem</button>

</form>

</div>

</section>


<div class="wave">

<svg viewBox="0 0 1440 120" preserveAspectRatio="none">
<path d="M0,60 C240,120 480,0 720,60 C960,120 1200,0 1440,60 L1440,120 L0,120 Z" fill="#ffffff"></path>
</svg>

<p class="copyright">
© 2026 CPG Technology Consulting — Todos os direitos reservados
</p>

</div>


<!-- POPUP SUCESSO -->

<div id="popupSucesso" class="modal">

<div class="modal-content">

<h3>✅ Mensagem enviada</h3>

<p>
Mensagem enviada com sucesso.<br>
Em breve entraremos em contato.
</p>

<button onclick="fecharPopupSucesso()">OK</button>

</div>

</div>


<!-- EMAILJS -->

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("jjCZK1jHx4tRtfUiS");
})();

function abrirPopupSucesso(){
document.getElementById("popupSucesso").style.display="flex";
}

function fecharPopupSucesso(){
document.getElementById("popupSucesso").style.display="none";
}

document.getElementById("formContato").addEventListener("submit", function(event) {

event.preventDefault();

emailjs.send("service_g4z931k","template_qjuhtw9",{
name: document.getElementById("nome").value,
email: document.getElementById("email").value,
message: document.getElementById("mensagem").value
})
.then(function() {

abrirPopupSucesso();
document.getElementById("formContato").reset();

}, function(error) {

alert("Erro ao enviar. Tente novamente.");

});

});

</script>

</body>
</html>
